name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create runtime config
        run: |
          cat > config.js <<EOF
          window.BRASS_CONFIG = {
            ownerEmail: "${{ secrets.BRASS_OWNER_EMAIL }}",
            supabaseUrl: "${{ secrets.BRASS_SUPABASE_URL }}",
            supabasePublicKey: "${{ secrets.BRASS_SUPABASE_PUBLIC_KEY }}"
          };
          EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
